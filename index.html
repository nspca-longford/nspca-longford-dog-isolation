<title>NSPCA Longford — Dog Intake Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--color-background-primary:#ffffff;--color-background-secondary:#f1f5f9;--color-text-secondary:#64748b;--color-border-secondary:#e2e8f0;--color-teal:#0d9488;--border-radius-md:8px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-family:inherit;font-size:13px;color:#0f172a;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
textarea{resize:vertical;min-height:68px}
.lbl{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.f{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:12px}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;padding:8px 0 10px;margin-top:4px;border-top:1px solid #e2e8f0}
nav{display:flex;overflow-x:auto;border-bottom:1px solid #e2e8f0;background:#fff;scrollbar-width:none;position:sticky;top:0;z-index:10}
nav::-webkit-scrollbar{display:none}
.nb{padding:11px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.nb.on{color:#185FA5;border-bottom-color:#378ADD}
.nb:hover:not(.on){color:#0f172a}
.btn{padding:9px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid #e2e8f0;background:#fff;color:#0f172a;transition:all 0.15s}
.btn:hover{background:#f8fafc}
.btnp{background:#0f172a;color:#fff;border-color:#0f172a}.btnp:hover{background:#1e293b}
.btng{background:#16a34a;color:#fff;border-color:#16a34a}.btng:hover{background:#15803d}
.btnr{background:#dc2626;color:#fff;border-color:#dc2626;font-size:11px;padding:5px 10px}
.brow{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
h2{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:3px}
.sub{font-size:12px;color:#64748b;margin-bottom:16px}
.scat{border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.sb{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:11px;text-align:left;background:#fff;color:#0f172a;font-family:inherit;line-height:1.4;transition:all 0.12s}
.sb .n{font-weight:600;font-size:12px;display:block;margin-bottom:1px}
.totb{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.rrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.rk{color:#64748b}.rv{font-weight:500;text-align:right;max-width:65%}
.db{border-left:2px solid #e2e8f0;padding-left:12px;margin-bottom:14px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.ea-warn{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.ea-clear{background:#dcfce7;border:1.5px solid #16a34a;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.rec-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.save-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px}
#content{max-width:740px;margin:0 auto;padding:20px 16px}
.header{background:#0f172a;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.subheader{background:#1e293b;padding:6px 20px}
#overdue-sticky{position:sticky;top:0;z-index:9;pointer-events:none}
#overdue-sticky:empty{display:none}
#overdue-sticky>*{pointer-events:auto}
.med-tbl th{padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--color-text-secondary)}
.med-tbl td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--color-border-secondary)}
.med-tbl tr:last-child td{border-bottom:none}
.badge-ok{background:#dcfce7;color:#166534;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-warn{background:#fef9c3;color:#854d0e;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-err{background:#fee2e2;color:#991b1b;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-off{background:#f1f5f9;color:#64748b;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
@media print{nav,.brow{display:none !important}body{background:white}}
/* Medical overlays */
.med-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.18s}
.med-overlay.show{opacity:1;pointer-events:all}
.med-modal{background:#fff;border-radius:16px;padding:20px 22px;width:340px;max-width:90vw;transform:translateY(12px) scale(0.97);transition:transform 0.18s;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-height:88vh;overflow-y:auto}
.med-overlay.show .med-modal{transform:translateY(0) scale(1)}
.med-add-btn{background:#0f172a;color:#fff;border:none;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit}
.med-add-btn:hover{background:#334155}
.med-save-btn{width:100%;padding:10px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;font-family:inherit}
.med-save-btn:hover{background:#1e293b}
.med-close-btn{background:#f1f5f9;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;color:#64748b;display:flex;align-items:center;justify-content:center;font-family:inherit}
.med-close-btn:hover{background:#e2e8f0}
</style>
</head>

async function doLogin(){

  var errEl=document.getElementById("login-err");
  errEl.style.display="none";
  if(!code)return;
  btn.textContent="Checking...";btn.disabled=true;
  var user=USERS.find(function(u){return u.code===code;});
  if(!user&&supabaseClient){try{var res=await supabaseClient.from("users").select("*").eq("code",code).single();if(res.data&&res.data.name)user=res.data;}catch(e){}}
  if(user){
    LOGGED_IN=true;CURRENT_USER=user;
    localStorage.setItem("nspca-intake-auth",code);
    localStorage.setItem("nspca-user-name",user.name);
    localStorage.setItem("nspca-user-role",user.role||"staff");

}

function generateAutoNotices(){
  var notices=[];var today=new Date().toISOString().slice(0,10);
  records.forEach(function(r){
    var f=r.state&&r.state.fin?r.state.fin:{};var outcome=f.outcome||"";
    var finished=outcome==="Finished Isolation";var active=!outcome||outcome==="Active — in isolation"||outcome==="Active - in isolation";
    if(!active&&!finished)return;
    var days=daysInIsolation(r.intakeDate);var d=r.state&&r.state.dog?r.state.dog:{};
    var name=r.name||"Unknown";var kennel=d.kennel?"("+d.kennel+")":"";
    if(!finished&&days>5)notices.push({priority:"Urgent",text:name+" "+kennel+" is overdue — Day "+days+" in isolation",icon:"&#128680;"});
    else if(!finished&&days===5)notices.push({priority:"Important",text:name+" "+kennel+" completes isolation today — Day 5",icon:"&#9989;"});
    else if(!finished&&days===4)notices.push({priority:"Important",text:name+" "+kennel+" finishes isolation tomorrow",icon:"&#9888;"});
    var weights=r.state&&r.state.weights?r.state.weights:[];
    if(!finished&&days){
      function weekStart(ds){var d=new Date(ds);var dy=d.getDay();var diff=dy===0?-6:1-dy;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
      var thisWeek=weekStart(today);
      var hasWeighIn=weights.find(function(w){return w.date>=thisWeek&&w.date<=today;});
      if(!hasWeighIn)notices.push({priority:"Normal",text:"Weigh-in due this week for "+name+" "+kennel,icon:"&#9878;"});
    }
    if(r.intakeDate===today&&days===1)notices.push({priority:"Normal",text:name+" "+kennel+" arrived today",icon:"&#128062;"});
    var mz=r.state&&r.state.assessment?r.state.assessment.muzzleRequired:"";
    if(mz==="Yes — currently required")notices.push({priority:"Normal",text:name+" "+kennel+" requires muzzle",icon:"&#128276;"});

    // Vaccine reminders
    if(active||finished){
      var med=r.state&&r.state.medical?r.state.medical:{};var vl=med.vaccinations||[];
      var VAC=["1st Vaccination","Kennel Cough","2nd Vaccination","Booster"];
      function addDS(ds,n){var x=new Date(ds);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);}
      VAC.forEach(function(vt){
        if(vl.some(function(v){return v.type===vt;}))return;
        var dueDate=null;
        var explicit=vl.find(function(v){return v.type===vt&&v.nextDue;});
        if(explicit&&explicit.nextDue){dueDate=explicit.nextDue;}
        else if(vt==="2nd Vaccination"){var first=vl.find(function(v){return v.type==="1st Vaccination";});if(first&&first.date)dueDate=addDS(first.date,28);}
        else if(vt==="Booster"){var first=vl.find(function(v){return v.type==="1st Vaccination";});if(first&&first.date)dueDate=addDS(first.date,365);}
        else if(vt==="Kennel Cough"){var lkc=vl.filter(function(v){return v.type==="Kennel Cough";}).sort(function(a,b){return(b.date||"").localeCompare(a.date||"");})[0];if(lkc&&lkc.date)dueDate=addDS(lkc.date,365);}
        if(!dueDate)return;
        var diff=Math.round((new Date(dueDate)-new Date(today))/(86400000));
        if(diff<0)notices.push({priority:"Urgent",text:name+" "+kennel+" — "+vt+" overdue by "+Math.abs(diff)+" day"+(Math.abs(diff)!==1?"s":""),icon:"&#128137;"});
        else if(diff===0)notices.push({priority:"Important",text:name+" "+kennel+" — "+vt+" due today",icon:"&#128137;"});
        else if(diff<=7)notices.push({priority:"Important",text:name+" "+kennel+" — "+vt+" due in "+diff+" day"+(diff!==1?"s":""),icon:"&#128137;"});
      });

      // Parasite treatment reminders — Bravecto + Milpro auto-renew at 3 months
      var pl=med.parasiteTreatments||[];
      ["Bravecto","Milpro"].forEach(function(drug){
        var lastDose=pl.filter(function(p){return(p.type||"").indexOf(drug)===0||(p.product||"").indexOf(drug)===0;}).sort(function(a,b){return(b.date||"").localeCompare(a.date||"");})[0];
        if(!lastDose||!lastDose.date)return;
        var nextDue=lastDose.nextDue||addDS(lastDose.date,90);
        var diff=Math.round((new Date(nextDue)-new Date(today))/(86400000));
        if(diff<0)notices.push({priority:"Urgent",text:name+" "+kennel+" — "+drug+" overdue by "+Math.abs(diff)+" day"+(Math.abs(diff)!==1?"s":""),icon:"&#128737;"});
        else if(diff===0)notices.push({priority:"Important",text:name+" "+kennel+" — "+drug+" due today",icon:"&#128737;"});
        else if(diff<=7)notices.push({priority:"Important",text:name+" "+kennel+" — "+drug+" due in "+diff+" day"+(diff!==1?"s":""),icon:"&#128737;"});
      });
    }
  });
  return notices;
}

function daysInIsolation(d){if(!d)return null;return Math.max(1,Math.floor((new Date()-new Date(d))/(1000*60*60*24))+1);}

// ── Weights ───────────────────────────────────────────────────────
function renderWeights(){
  try{
    var weights=S.weights||[];var intakeDate=(S.dog&&S.dog.intakeDate)?S.dog.intakeDate:new Date().toISOString().slice(0,10);var today=new Date().toISOString().slice(0,10);
    function weekStart(ds){var d=new Date(ds);if(isNaN(d.getTime()))return today;var day=d.getDay();var diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
    var weeks=[];var ws=weekStart(intakeDate);var limit=0;
    while(ws<=today&&limit<52){var we=addDaysStr(ws,6);var entry=weights.find(function(w){return w.date>=ws&&w.date<=we;})||null;weeks.push({ws:ws,we:we,entry:entry,current:ws===weekStart(today)});ws=addDaysStr(ws,7);limit++;}
    var dueThisWeek=weeks.length>0&&!weeks[weeks.length-1].entry;
    var banner=dueThisWeek?'<div style="background:#fef9c3;border:1px solid #f59e0b;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div style="font-size:13px;font-weight:700;color:#854d0e">&#9888; Weekly weigh-in due</div><div style="font-size:12px;color:#92400e;margin-top:2px">No weight recorded this week</div></div><button class="btn btnp" onclick="document.getElementById(&quot;w-val&quot;).focus()">Log Weight Now</button></div>':"";
    var recorded=weeks.filter(function(w){return w.entry;}).length;
    var tableRows=weeks.slice().reverse().map(function(w,i){

      var label=new Date(w.ws).toLocaleDateString("en-IE",{day:"numeric",month:"short"})+" — "+new Date(w.we).toLocaleDateString("en-IE",{day:"numeric",month:"short"});
      if(w.entry){var changeHtml="";if(prevW&&prevW.entry){var curr=parseFloat((w.entry.weight||"0").replace(/[^0-9.]/g,""));var prev=parseFloat((prevW.entry.weight||"0").replace(/[^0-9.]/g,""));if(!isNaN(curr)&&!isNaN(prev)&&prev>0){var diff=Math.round((curr-prev)*10)/10;if(diff>0)changeHtml='<span style="color:#166534;font-size:11px;font-weight:600;margin-left:6px">&#9650; +'+diff+' kg</span>';else if(diff<0)changeHtml='<span style="color:#dc2626;font-size:11px;font-weight:600;margin-left:6px">&#9660; '+diff+' kg</span>';else changeHtml='<span style="color:#94a3b8;font-size:11px;margin-left:6px">&mdash; no change</span>';}}return'<tr><td style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">'+(w.current?"<strong>This week</strong>":label)+'</td><td style="padding:10px 12px;font-size:14px;font-weight:700;color:#166534">'+w.entry.weight+changeHtml+'</td><td style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">'+w.entry.date+(w.entry.note?' &middot; '+esc(w.entry.note):'')+'</td><td style="padding:10px 12px;text-align:right"><button onclick="deleteWeight('+weights.indexOf(w.entry)+')" style="background:#fee2e2;color:#991b1b;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">&#10005;</button></td></tr>';}

function compressPhoto(file,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var MAX=400,w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}var cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);cb(cv.toDataURL("image/jpeg",0.75));};img.src=e.target.result;};r.readAsDataURL(file);}

    var d2=S.dog,a2=S.arrival,f2=S.fin,m2=S.medical||{};
    var drows=[["Ref. no.",d2.refNo],["Intake date",d2.intakeDate],["Reason",d2.intakeReason],["Assessor",d2.assessor],["Breed",d2.breed],["Sex",d2.sex],["Age",d2.age],["Colour",d2.colour],["Weight",d2.weight],["Microchip",d2.microchip]].filter(function(r){return r[1]}).map(function(r){return'<div class="rrow"><span class="rk">'+r[0]+'</span><span class="rv">'+r[1]+'</span></div>'}).join("");
    var arows=[["Demeanour",a2.demeanour],["Muzzle",a2.muzzle],["Lead handling",a2.lead],["First vet visit",a2.vet],["Dog-to-dog",a2.dogDog],["Cat tolerance",a2.catTolerance],["Child history",a2.childHistory],["Bite history",a2.biteHistory]].filter(function(r){return r[1]}).map(function(r){return'<div class="rrow"><span class="rk">'+r[0]+'</span><span class="rv">'+r[1]+'</span></div>'}).join("");
    var dblocks=S.days.map(function(dy,i){var rows=[["Demeanour",dy.demeanour],["Feeding",dy.feeding],["Toileting",dy.toileting],["Staff interaction",dy.staffInt],["Incidents",dy.incidents]].filter(function(r){return r[1]}).map(function(r){return'<div style="font-size:12px;margin-bottom:3px"><span style="color:#64748b">'+r[0]+': </span><span style="font-weight:500">'+r[1]+'</span></div>'}).join("");return'<div class="db"><div style="font-size:13px;font-weight:600;margin-bottom:5px">Day '+(i+1)+(dy.date?" — "+dy.date:"")+'</div>'+(rows||'<span style="font-size:12px;color:#64748b">No data.</span>')+(dy.notes?'<div style="font-size:12px;color:#64748b;margin-top:5px">'+dy.notes+'</div>':'')+'</div>';}).join("");
    var srows=CATS.map(function(c){var v=S.scores[c.k];return'<div class="sr"><span>'+c.l+'</span><div style="display:flex;align-items:center;gap:8px">'+(v?'<span style="font-size:11px;color:#64748b">'+c.s[v]+'</span>':'')+'<span class="pill" style="'+sc(v)+'">'+v+'</span></div></div>';}).join("");
    var concerns=[f2.c1,f2.c2,f2.c3].filter(Boolean).map(function(c,i){return'<div style="display:flex;gap:10px;margin-bottom:8px"><div style="width:20px;height:20px;border-radius:50%;background:#fee2e2;color:#991b1b;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">'+(i+1)+'</div><span style="font-size:13px">'+c+'</span></div>'}).join("");
    var activeMeds2=(m2.medications||[]).filter(function(x){return x.active!==false;});
    var lastVax2=(m2.vaccinations||[]).slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");})[0]||null;
    var lastPara2=(m2.parasiteTreatments||[]).slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");})[0]||null;
    var lastVet2=(m2.vetVisits||[]).slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");})[0]||null;
    var medSummaryRows=[["BCS",m2.bcs],["Neutered",m2.neuteredConfirmed],["Dental",m2.dental],["Skin / Coat",m2.skinCondition],["Injuries",m2.injuries],["Last vaccination",lastVax2?(lastVax2.date+" — "+lastVax2.type):""],["Last parasite tx",lastPara2?(lastPara2.date+" — "+lastPara2.type):""],["Last vet visit",lastVet2?(lastVet2.date+(lastVet2.reason?" — "+lastVet2.reason:"")):""]].filter(function(r){return r[1]}).map(function(r){return'<div class="rrow"><span class="rk">'+r[0]+'</span><span class="rv">'+esc(r[1])+'</span></div>';}).join("");
    var activeMedsHtml=activeMeds2.length?'<div style="background:#dbeafe;border:1px solid #93c5fd;border-radius:8px;padding:10px 14px;margin-top:8px"><div style="font-size:11px;font-weight:700;color:#1e40af;text-transform:uppercase;margin-bottom:6px">&#128138; '+activeMeds2.length+' Active Medication'+(activeMeds2.length!==1?"s":"")+'</div>'+activeMeds2.map(function(med){return'<div style="font-size:12px;color:#1e3a8a;margin-bottom:2px"><strong>'+esc(med.name)+'</strong>'+(med.dose?" — "+esc(med.dose):"")+'</div>';}).join("")+'</div>':"";
    var medCard=(medSummaryRows||activeMedsHtml)?'<div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:8px">Medical summary</div>'+medSummaryRows+activeMedsHtml+'</div>':"";
    return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0">Full assessment report</h2><button class="btn" onclick="window.print()" style="font-size:12px">Print</button></div><div style="background:#0f172a;border-radius:10px;padding:16px 18px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="color:#94a3b8;font-size:11px;margin-bottom:2px">'+(d2.refNo||"&nbsp;")+'</div><div style="color:#fff;font-size:22px;font-weight:600">'+(d2.name||"—")+'</div><div style="color:#94a3b8;font-size:12px;margin-top:2px">'+[d2.breed,d2.sex,d2.age].filter(Boolean).join(" · ")+'</div></div><div style="text-align:right">'+tlb2+(total2?'<div style="color:#94a3b8;font-size:11px;margin-top:4px">Score: '+total2+'/24</div>':"")+'</div></div></div>'+(ea2?'<div class="ea-warn" style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:#92400e">&#9888; Enhanced Assessment flagged</div></div>':'')+'<div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:8px">Dog details</div>'+(drows||"—")+'</div>'+medCard+'<div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:8px">On-arrival &amp; behaviour history</div>'+(arows||"")+(a2.notes?'<div style="font-size:12px;margin-top:10px;padding:10px;background:#f8fafc;border-radius:6px">'+a2.notes+'</div>':"")+'</div><div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:10px">5-Day isolation log</div>'+dblocks+'</div><div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:8px">Behaviour scoring</div>'+srows+'<div style="display:flex;justify-content:space-between;padding:10px 0 0;font-weight:600;font-size:13px"><span>Total</span><span>'+total2+'/24</span></div></div>'+((concerns||f2.steps)?'<div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:10px">Primary concerns &amp; next steps</div>'+concerns+(f2.steps?'<div style="background:#dbeafe;border-radius:6px;padding:11px;margin-top:8px"><div style="font-size:10px;font-weight:600;color:#0369a1;text-transform:uppercase;margin-bottom:3px">Recommended next steps</div><div style="font-size:13px">'+f2.steps+'</div></div>':'')+(f2.handoverNote?'<div style="margin-top:10px;padding:10px;background:#f8fafc;border-radius:6px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:#64748b;margin-bottom:4px">Kennel handover note</div><div style="font-size:13px">'+f2.handoverNote+'</div></div>':'')+'</div>':'')+(f2.assessorName?'<div class="card"><div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#64748b;margin-bottom:8px">Sign-off</div><div class="rrow"><span class="rk">Assessor</span><span class="rv">'+f2.assessorName+(f2.assessorDate?' — '+f2.assessorDate:'')+'</span></div>'+(f2.secondAssessor?'<div class="rrow"><span class="rk">Second assessor</span><span class="rv">'+f2.secondAssessor+(f2.secondAssessorDate?' — '+f2.secondAssessorDate:'')+'</span></div>':'')+'</div>':'')+'<div class="brow"><button class="btn" data-go="medical">&larr; Back</button><button class="btn" onclick="window.print()">Print</button><button class="btn btng" data-action="save-record">&#128190; Save</button></div>';
  }

  if(t==="assessment")return renderAssessment();
  if(t==="medical")return renderMedical();
  if(t==="weights")return renderWeights();
  if(t==="files")return renderFiles();
  return"";
}

function renderNav(){document.getElementById("nav").innerHTML=TABS.map(function(tb){return'<button class="nb'+(S.tab===tb.id?" on":"")+'" data-go="'+tb.id+'">'+tb.l+'</button>';}).join("");}
function renderMain(){document.getElementById("content").innerHTML=page();}
function render(){renderNav();renderMain();}

function handleAppClick(e){
  var go=e.target.closest("[data-go]");if(go){S.tab=go.dataset.go;render();window.scrollTo(0,0);return;}
  var sc2=e.target.closest("[data-sc]");if(sc2){var p=sc2.dataset.sc.split(".");S.scores[p[0]]=S.scores[p[0]]===parseInt(p[1])?0:parseInt(p[1]);renderMain();debouncedSave();return;}
  if(e.target.closest("[data-action='save-record']")){saveRecord();return;}
  if(e.target.closest("[data-action='new-dog']")){if(confirm("Start a new dog?")){S=defaultState();persistSave();render();}return;}
  var ld=e.target.closest("[data-load]");if(ld){openDog(parseInt(ld.dataset.load));return;}
  var dl=e.target.closest("[data-delete]");
  if(dl){var role=currentRole();if(role==="staff"){alert("You don't have permission to delete records.");return;}if(confirm("Delete this record? Cannot be undone.")){deleteRecord(parseInt(dl.dataset.delete));}return;}
}
document.getElementById("wrap").addEventListener("click",handleAppClick);
document.getElementById("dashboard-screen").addEventListener("click",handleAppClick);
document.getElementById("wrap").addEventListener("input",function(e){
  var el=e.target;
  if(el.dataset.save){
    var p=el.dataset.save.split(".");var val=el.type==="checkbox"?el.checked:el.value;
    if(p[0]==="dog"&&p[1]==="weight")val=val?(parseFloat(val)+" kg"):"";
    if(!S[p[0]])S[p[0]]={};
    S[p[0]][p[1]]=val;
    if(p[0]==="dog"&&p[1]==="name"){var bg=document.getElementById("badge");if(bg){bg.style.display=val?"block":"none";bg.textContent=val;}}
    debouncedSave();
  }
  if(el.dataset.sd){var p2=el.dataset.sd.split(".");S.days[parseInt(p2[0])][p2[1]]=el.value;debouncedSave();}
});
document.getElementById("wrap").addEventListener("change",function(e){
  var el=e.target;
  if(el.dataset.save){
    var p=el.dataset.save.split(".");var val=el.type==="checkbox"?el.checked:el.value;
    if(p[0]==="dog"&&p[1]==="weight")val=val?(parseFloat(val)+" kg"):"";
    if(!S[p[0]])S[p[0]]={};
    S[p[0]][p[1]]=val;
    if(p[0]==="dog"&&p[1]==="name"){var bg=document.getElementById("badge");if(bg){bg.style.display=val?"block":"none";bg.textContent=val;}}
    renderMain();debouncedSave();
  }
  if(el.dataset.sd){
    var p2=el.dataset.sd.split(".");var dayIdx=parseInt(p2[0]);var dayField=p2[1];
    S.days[dayIdx][dayField]=el.value;
    if(dayIdx===0&&dayField==="date"&&el.value){for(var j=1;j<=4;j++){if(!S.days[j].date){var nd=new Date(el.value);nd.setDate(nd.getDate()+j);S.days[j].date=nd.toISOString().slice(0,10);}}}
    renderMain();debouncedSave();
  }
});

// ── Supabase ──────────────────────────────────────────────────────
function initSupabase(){
  supabaseClient={from:function(table){
    var base=SUPABASE_URL+"/rest/v1/"+table;
    var headers={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};
    return{
      select:function(cols){
        var q=base+"?select="+(cols||"*");
        var chain={
          eq:function(col,val){q+="&"+col+"=eq."+encodeURIComponent(val);return chain;},
          limit:function(n){q+="&limit="+n;return chain;},
          order:function(col,opts){q+="&order="+col+(opts&&opts.ascending===false?".desc":".asc");return chain;},
          single:function(){return fetch(q,{headers:Object.assign({},headers,{"Accept":"application/vnd.pgrst.object+json"})}).then(function(r){return r.json().then(function(d){return r.ok?{data:d,error:null}:{data:null,error:d};});});},
          then:function(res,rej){return fetch(q,{headers:headers}).then(function(r){return r.json().then(function(d){var result=r.ok?{data:d,error:null}:{data:null,error:d};if(res)res(result);return result;});}).catch(function(e){var result={data:null,error:{message:e.message}};if(rej)rej(result);return result;});}
        };return chain;
      },
      insert:function(rows){return fetch(base,{method:"POST",headers:Object.assign({},headers,{"Prefer":"return=representation"}),body:JSON.stringify(Array.isArray(rows)?rows[0]:rows)}).then(function(r){return r.json().then(function(d){return r.ok?{data:Array.isArray(d)?d:[d],error:null}:{data:null,error:d};});});},
      update:function(data){var q2=base;return{eq:function(col,val){q2+="?"+col+"=eq."+encodeURIComponent(val);return fetch(q2,{method:"PATCH",headers:Object.assign({},headers,{"Prefer":"return=representation"}),body:JSON.stringify(data)}).then(function(r){return r.json().then(function(d){return r.ok?{data:d,error:null}:{data:null,error:d};});});}};},
      delete:function(){return{eq:function(col,val){return fetch(base+"?"+col+"=eq."+encodeURIComponent(val),{method:"DELETE",headers:headers}).then(function(r){return r.ok?{data:null,error:null}:{data:null,error:{message:"Delete failed"}};});}};},
    };
  }};return true;
}

function showSaved(){var btn=document.getElementById("save-btn");if(btn){btn.textContent="Saved ✓";btn.style.background="#15803d";setTimeout(function(){btn.textContent="Save";btn.style.background="";},2000);}}

async function saveRecord(){
  if(!supabaseClient){persistSave();showSaved();return;}
  if(!S.dog||!S.dog.name){persistSave();return;}
  var total=Object.values(S.scores||{}).reduce(function(a,v){return a+(parseInt(v)||0);},0);
  var tl=total<=10?"Green":total<=14?"Yellow":total<=20?"Red":"Black";
  var st=JSON.parse(JSON.stringify(S));delete st._id;st._savedBy=currentName();
  var row={name:S.dog.name,breed:S.dog.breed||"",ref_no:S.dog.refNo||"",intake_date:S.dog.intakeDate||null,assessor:S.dog.assessor||"",score:total,traffic_light:tl,saved_at:new Date().toISOString(),data:st};
  try{
    if(S._id){await supabaseClient.from("dogs").update(row).eq("id",S._id);}
    else{var res=await supabaseClient.from("dogs").insert([row]);if(res.data&&res.data[0]){S._id=res.data[0].id;}}
    persistSave();showSaved();await loadRecordsList();
  }catch(e){console.error("saveRecord:",e);persistSave();}
}

async function deleteRecord(id){
  if(!supabaseClient)return;
  await supabaseClient.from("dogs").delete().eq("id",id);
  await loadRecordsList();
  var ds=document.getElementById("dashboard-screen");
  if(ds&&ds.style.display!=="none")showDashSection("records");
  else renderMain();
}

function loadRecord(id){
  var rec=records.find(function(r){return r.id===id;});if(!rec||!rec.state)return;
  var saved=rec.state;S=defaultState();
  if(saved.dog)S.dog=Object.assign({},S.dog,saved.dog);
  if(saved.arrival)S.arrival=Object.assign({},S.arrival,saved.arrival);
  if(saved.days)S.days=saved.days;
  if(saved.scores)S.scores=Object.assign({},S.scores,saved.scores);
  if(saved.fin)S.fin=Object.assign({},S.fin,saved.fin);
  if(saved.assessment){
    S.assessment=Object.assign({},S.assessment,saved.assessment);
    if(saved.assessment.buddyWalks)S.assessment.buddyWalks=saved.assessment.buddyWalks;
    if(saved.assessment.playdates)S.assessment.playdates=saved.assessment.playdates;
    if(saved.assessment.muzzleSessions)S.assessment.muzzleSessions=saved.assessment.muzzleSessions;
  }
  if(saved.medical){
    S.medical=Object.assign({},S.medical,saved.medical);
    if(saved.medical.vaccinations)S.medical.vaccinations=saved.medical.vaccinations;
    if(saved.medical.parasiteTreatments)S.medical.parasiteTreatments=saved.medical.parasiteTreatments;
    if(saved.medical.medications)S.medical.medications=saved.medical.medications;
    if(saved.medical.vetVisits)S.medical.vetVisits=saved.medical.vetVisits;
  } else if(saved.dog){
    if(saved.dog.bcs&&!S.medical.bcs)S.medical.bcs=saved.dog.bcs;
    if(saved.dog.neuteredConfirmed&&!S.medical.neuteredConfirmed)S.medical.neuteredConfirmed=saved.dog.neuteredConfirmed;
    if(saved.dog.injuries&&!S.medical.injuries)S.medical.injuries=saved.dog.injuries;
  }
  if(saved.weights)S.weights=saved.weights;
  if(saved.files)S.files=saved.files;
  S._id=rec.id;S.tab="report";render();
}

async function loadRecordsList(){
  if(!supabaseClient){records=[];return;}
  var res=await supabaseClient.from("dogs").select("*").order("saved_at",{ascending:false}).limit(50);
  if(res.error){console.error(res.error);records=[];return;}
  records=(res.data||[]).map(function(row){
    var st=null;try{st=typeof row.data==="string"?JSON.parse(row.data):row.data;}catch(e){}
    var savedBy=st&&st._savedBy?st._savedBy:"";
    return{id:row.id,savedAt:row.saved_at,savedBy:savedBy,name:row.name||"Unknown",breed:row.breed,refNo:row.ref_no,intakeDate:row.intake_date,assessor:row.assessor,score:row.score,trafficLight:row.traffic_light,state:st};
  });
}

function loadCurrent(){
  try{
    var s=localStorage.getItem("nspca-current");
    if(s){var saved=JSON.parse(s);if(saved._id)S._id=saved._id;if(saved.dog)S.dog=Object.assign({},S.dog,saved.dog);if(saved.arrival)S.arrival=Object.assign({},S.arrival,saved.arrival);if(saved.days)S.days=saved.days;if(saved.scores)S.scores=Object.assign({},S.scores,saved.scores);if(saved.fin)S.fin=Object.assign({},S.fin,saved.fin);if(saved.weights)S.weights=saved.weights;if(saved.files)S.files=saved.files;if(saved.assessment)S.assessment=Object.assign({},S.assessment,saved.assessment);if(saved.medical)S.medical=Object.assign({},S.medical,saved.medical);}
  }catch(e){}
}

// ── Init ──────────────────────────────────────────────────────────
(function(){
  initSupabase();loadCurrent();
  var savedCode=localStorage.getItem("nspca-intake-auth");
  if(savedCode){
    var user=USERS.find(function(u){return u.code===savedCode;});
    if(user){LOGGED_IN=true;CURRENT_USER=user;localStorage.setItem("nspca-user-name",user.name);localStorage.setItem("nspca-user-role",user.role);loadRecordsList().then(function(){showDashboard();});}
    else{showScreen("login-screen");}
  }else{showScreen("login-screen");}
})();
</script>
