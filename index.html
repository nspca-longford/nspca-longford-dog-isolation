<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSPCA Longford — Dog Intake Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{--color-background-primary:#ffffff;--color-background-secondary:#f1f5f9;--color-text-secondary:#64748b;--color-border-secondary:#e2e8f0;--color-teal:#0d9488;--border-radius-md:8px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-family:inherit;font-size:13px;color:#0f172a;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
textarea{resize:vertical;min-height:68px}
.lbl{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.f{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:12px}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;padding:8px 0 10px;margin-top:4px;border-top:1px solid #e2e8f0}
nav{display:flex;overflow-x:auto;border-bottom:1px solid #e2e8f0;background:#fff;scrollbar-width:none;position:sticky;top:0;z-index:10}
nav::-webkit-scrollbar{display:none}
.nb{padding:11px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.nb.on{color:#185FA5;border-bottom-color:#378ADD}
.nb:hover:not(.on){color:#0f172a}
.btn{padding:9px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid #e2e8f0;background:#fff;color:#0f172a;transition:all 0.15s}
.btn:hover{background:#f8fafc}
.btnp{background:#0f172a;color:#fff;border-color:#0f172a}.btnp:hover{background:#1e293b}
.btng{background:#16a34a;color:#fff;border-color:#16a34a}.btng:hover{background:#15803d}
.btnr{background:#dc2626;color:#fff;border-color:#dc2626;font-size:11px;padding:5px 10px}
.brow{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
h2{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:3px}
.sub{font-size:12px;color:#64748b;margin-bottom:16px}
.scat{border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.sb{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:11px;text-align:left;background:#fff;color:#0f172a;font-family:inherit;line-height:1.4;transition:all 0.12s}
.sb .n{font-weight:600;font-size:12px;display:block;margin-bottom:1px}
.totb{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.rrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.rk{color:#64748b}.rv{font-weight:500;text-align:right;max-width:65%}
.db{border-left:2px solid #e2e8f0;padding-left:12px;margin-bottom:14px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.ea-warn{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.ea-clear{background:#dcfce7;border:1.5px solid #16a34a;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.rec-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.save-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px}
#content{max-width:740px;margin:0 auto;padding:20px 16px}
.header{background:#0f172a;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.subheader{background:#1e293b;padding:6px 20px}
#overdue-sticky{position:sticky;top:0;z-index:9;pointer-events:none}
#overdue-sticky:empty{display:none}
#overdue-sticky>*{pointer-events:auto}
/* ── Medical tab overlays ─────────────────────────── */
.med-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.18s}
.med-overlay.show{opacity:1;pointer-events:all}
.med-modal{background:#fff;border-radius:16px;padding:20px 22px;width:340px;max-width:90vw;transform:translateY(12px) scale(0.97);transition:transform 0.18s;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-height:88vh;overflow-y:auto}
.med-overlay.show .med-modal{transform:translateY(0) scale(1)}
.med-add-btn{background:#0f172a;color:#fff;border:none;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.15s}
.med-add-btn:hover{background:#334155}
.med-save-btn{width:100%;padding:10px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;font-family:inherit;transition:background 0.15s}
.med-save-btn:hover{background:#1e293b}
.med-close-btn{background:#f1f5f9;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;color:#64748b;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.med-close-btn:hover{background:#e2e8f0}
.med-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.med-card-title{font-size:12px;font-weight:600}
/* ── Medical vaccination tiles ──────────────────── */
.vac-tile{border:1px solid;border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.vac-tile-done{background:#dcfce7;border-color:#16a34a}
.vac-tile-pending{background:#f8fafc;border-color:#e2e8f0}
.vac-badge-done{background:#16a34a;color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.vac-badge-pending{background:#e2e8f0;color:#64748b;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
/* ── Parasite rows ───────────────────────────────── */
.para-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0}
.para-icon{width:28px;height:28px;border-radius:6px;background:#fef9c3;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
@media print{nav,.brow{display:none !important}body{background:white}}
</style>
</head>
<body>

  </div>
  <div style="background:#1e293b;padding:7px 24px;display:flex;align-items:center;gap:8px">
    <span style="color:#c5e86c;font-size:10px">&#9679;</span>
    <span style="color:#94a3b8;font-size:11px">Isolation Unit &nbsp;&mdash;&nbsp; Longford</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 80px);padding:24px">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)">
      <div style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:6px">Enter access code</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:24px">Your code identifies you and sets your access level</div>
      <input id="login-code" type="password" placeholder="••••••" style="text-align:center;font-size:22px;letter-spacing:0.18em;margin-bottom:12px;background:#f8fafc;border-radius:8px;padding:12px 14px" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn btnp" style="width:100%;padding:11px;font-size:14px;border-radius:8px" id="login-btn" onclick="doLogin()">Enter &rarr;</button>
      <div id="login-err" style="display:none;color:#dc2626;font-size:12px;margin-top:10px;padding:8px;background:#fef2f2;border-radius:6px">Incorrect code. Try again.</div>
      <div style="border-top:1px solid #e2e8f0;margin-top:20px;padding-top:16px;font-size:11px;color:#94a3b8">Contact Shane Cox to request a code</div>
    </div>
  </div>
</div>

<div id="dashboard-screen" style="display:none;min-height:100vh;background:var(--color-background-secondary)">
  <div style="background:#0f172a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="color:#fff;font-size:13px;font-weight:500">NSPCA Longford - Isolation</div>
      <span id="dash-clock" style="background:#1e293b;border:0.5px solid #334155;border-radius:20px;padding:3px 10px;font-size:11px;color:#94a3b8"></span>
      <span id="dash-count" style="background:#0d9488;border-radius:20px;padding:3px 10px;font-size:11px;color:#fff;font-weight:500;display:none"></span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span id="dash-user" style="background:#1e293b;border:0.5px solid #334155;border-radius:20px;padding:3px 10px;font-size:11px;color:#94a3b8;display:none;align-items:center;gap:6px"></span>
      <button onclick="showDashSection('records')" style="background:#1e293b;color:#94a3b8;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">Records</button>
      <button onclick="showDashSection('stats')" style="background:#1e293b;color:#94a3b8;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">Stats</button>
      <button onclick="exportCSV()" style="background:#1e293b;color:#94a3b8;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit" title="Export all records as CSV">CSV &#8595;</button>
      <button onclick="openNewDog()" style="background:#0d9488;color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">+ New Dog</button>
      <button onclick="doLogout()" style="background:transparent;border:none;color:#64748b;cursor:pointer;padding:4px;font-size:12px;font-family:inherit">Log out</button>
    </div>
  </div>
  <div id="overdue-sticky"></div>
  <div style="max-width:900px;margin:0 auto;padding:18px"><div id="dashboard-content"></div></div>

function generateAutoNotices(){
  var notices=[];var today=new Date().toISOString().slice(0,10);
  records.forEach(function(r){
    var f=r.state&&r.state.fin?r.state.fin:{};var outcome=f.outcome||"";
    var finished=outcome==="Finished Isolation";var active=!outcome||outcome==="Active — in isolation"||outcome==="Active - in isolation";
    if(!active&&!finished)return;
    var days=daysInIsolation(r.intakeDate);var d=r.state&&r.state.dog?r.state.dog:{};
    var name=r.name||"Unknown";var kennel=d.kennel?"("+d.kennel+")":"";
    if(!finished&&days>5)notices.push({priority:"Urgent",text:name+" "+kennel+" is overdue — Day "+days+" in isolation",icon:"&#128680;"});
    else if(!finished&&days===5)notices.push({priority:"Important",text:name+" "+kennel+" completes isolation today — Day 5",icon:"&#9989;"});
    else if(!finished&&days===4)notices.push({priority:"Important",text:name+" "+kennel+" finishes isolation tomorrow",icon:"&#9888;"});
    var weights=r.state&&r.state.weights?r.state.weights:[];
    if(!finished&&days){
      function weekStart(ds){var dd=new Date(ds);var dy=dd.getDay();var diff=dy===0?-6:1-dy;dd.setDate(dd.getDate()+diff);return dd.toISOString().slice(0,10);}
      var thisWeek=weekStart(today);
      var hasWeighIn=weights.find(function(w){return w.date>=thisWeek&&w.date<=today;});
      if(!hasWeighIn)notices.push({priority:"Normal",text:"Weigh-in due this week for "+name+" "+kennel,icon:"&#9878;"});
    }
    if(r.intakeDate===today&&days===1)notices.push({priority:"Normal",text:name+" "+kennel+" arrived today",icon:"&#128062;"});
    var mz=r.state&&r.state.assessment?r.state.assessment.muzzleRequired:"";
    if(mz==="Yes — currently required")notices.push({priority:"Normal",text:name+" "+kennel+" requires muzzle",icon:"&#128276;"});
  });
  return notices;
}

// ── Weights ───────────────────────────────────────────────────────
function renderWeights(){
  try{
    var weights=S.weights||[];var intakeDate=(S.dog&&S.dog.intakeDate)?S.dog.intakeDate:new Date().toISOString().slice(0,10);var today=new Date().toISOString().slice(0,10);
    function weekStart(ds){var d=new Date(ds);if(isNaN(d.getTime()))return today;var day=d.getDay();var diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
    var weeks=[];var ws=weekStart(intakeDate);var limit=0;
    while(ws<=today&&limit<52){var we=addDaysStr(ws,6);var entry=weights.find(function(w){return w.date>=ws&&w.date<=we;})||null;weeks.push({ws:ws,we:we,entry:entry,current:ws===weekStart(today)});ws=addDaysStr(ws,7);limit++;}
    var dueThisWeek=weeks.length>0&&!weeks[weeks.length-1].entry;
    var banner=dueThisWeek?'<div style="background:#fef9c3;border:1px solid #f59e0b;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div style="font-size:13px;font-weight:700;color:#854d0e">&#9888; Weekly weigh-in due</div><div style="font-size:12px;color:#92400e;margin-top:2px">No weight recorded this week</div></div><button class="btn btnp" onclick="document.getElementById(&quot;w-val&quot;).focus()">Log Weight Now</button></div>':"";
    var recorded=weeks.filter(function(w){return w.entry;}).length;
    var tableRows=weeks.slice().reverse().map(function(w,i){
      var revWeeks=weeks.slice().reverse();var prevW=revWeeks[i+1]||null;
      var label=new Date(w.ws).toLocaleDateString("en-IE",{day:"numeric",month:"short"})+" — "+new Date(w.we).toLocaleDateString("en-IE",{day:"numeric",month:"short"});
      if(w.entry){var changeHtml="";if(prevW&&prevW.entry){var curr=parseFloat((w.entry.weight||"0").replace(/[^0-9.]/g,""));var prev=parseFloat((prevW.entry.weight||"0").replace(/[^0-9.]/g,""));if(!isNaN(curr)&&!isNaN(prev)&&prev>0){var diff=Math.round((curr-prev)*10)/10;if(diff>0)changeHtml='<span style="color:#166534;font-size:11px;font-weight:600;margin-left:6px">&#9650; +'+diff+' kg</span>';else if(diff<0)changeHtml='<span style="color:#dc2626;font-size:11px;font-weight:600;margin-left:6px">&#9660; '+diff+' kg</span>';else changeHtml='<span style="color:#94a3b8;font-size:11px;margin-left:6px">&mdash; no change</span>';}}return'<tr><td style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">'+(w.current?"<strong>This week</strong>":label)+'</td><td style="padding:10px 12px;font-size:14px;font-weight:700;color:#166534">'+w.entry.weight+changeHtml+'</td><td style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">'+w.entry.date+(w.entry.note?' &middot; '+esc(w.entry.note):'')+'</td><td style="padding:10px 12px;text-align:right"><button onclick="deleteWeight('+weights.indexOf(w.entry)+')" style="background:#fee2e2;color:#991b1b;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">&#10005;</button></td></tr>';}
      else return'<tr style="opacity:0.45"><td style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">'+(w.current?"<strong>This week</strong>":label)+'</td><td style="padding:10px 12px;font-size:12px;color:#dc2626;font-weight:600">Not recorded</td><td></td><td></td></tr>';
    }).join("");
    return'<h2 style="margin-bottom:4px">Weight Records</h2><div class="sub" style="margin-bottom:16px">Weekly tracking from intake date.</div>'+banner+'<div class="card" style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px">Log Weight</div><div class="g2"><div class="f"><label class="lbl">Date</label><input type="date" id="w-date" value="'+today+'"></div><div class="f"><label class="lbl">Weight</label><div style="display:flex;align-items:center;gap:8px"><input type="number" step="0.1" min="0" id="w-val" placeholder="12.5" style="flex:1"><span style="font-weight:700;color:var(--color-text-secondary)">kg</span></div></div></div><div class="f"><label class="lbl">Note (optional)</label><input id="w-note" placeholder="e.g. Post-treatment weigh-in"></div><button class="btn btnp" onclick="addWeight()">+ Add Entry</button></div>'+(weeks.length?'<div class="card"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px">Weekly Progress ('+recorded+' of '+weeks.length+' weeks recorded)</div><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:2px solid var(--color-border-secondary)"><th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--color-text-secondary)">Week</th><th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--color-text-secondary)">Weight</th><th style="padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--color-text-secondary)">Detail</th><th></th></tr></thead><tbody>'+tableRows+'</tbody></table></div>':'<div style="text-align:center;padding:30px;color:var(--color-text-secondary)">No weight entries yet.</div>')
    +'<div class="brow"><button class="btn" data-go="medical">&larr; Back</button><button class="btn btnp" data-go="files">Next: files &rarr;</button></div>';
  }catch(err){return'<div style="padding:20px;color:#dc2626">Weight tab error: '+err.message+'</div>';}
}
function addWeight(){var dEl=document.getElementById("w-date"),vEl=document.getElementById("w-val"),nEl=document.getElementById("w-note");var d=dEl?dEl.value.trim():"",v=vEl?vEl.value.trim():"",n=nEl?nEl.value.trim():"";if(!d||!v){alert("Please enter a date and weight.");return;}if(!S.weights)S.weights=[];S.weights.push({date:d,weight:parseFloat(v)+" kg",note:n});saveRecord();renderMain();}

  +'<div class="brow"><button class="btn" data-go="weights">&larr; Back</button><button class="btn btnp" data-go="report">View report &rarr;</button></div>';

function compressPhoto(file,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var MAX=400,w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}var cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);cb(cv.toDataURL("image/jpeg",0.75));};img.src=e.target.result;};r.readAsDataURL(file);}
function handlePhotoUpload(inp){var file=inp.files[0];if(!file)return;if(file.size>5*1024*1024){alert("Photo too large. Max 5MB.");return;}compressPhoto(file,function(data){S.dog.photo=data;renderMain();});}
function removePhoto(){S.dog.photo="";renderMain();}
function handleFileUpload(inp){var file=inp.files[0];if(!file)return;if(file.size>5*1024*1024){alert("File too large. Max 5MB.");return;}var note=(document.getElementById("f-note")||{}).value||"";var date=new Date().toISOString().slice(0,10);if(file.type.startsWith("image/")){compressPhoto(file,function(data){S.files=S.files||[];S.files.push({name:file.name,data:data,type:"image",date:date,note:note});renderMain();});}else{var r=new FileReader();r.onload=function(e){S.files=S.files||[];S.files.push({name:file.name,data:e.target.result,type:"doc",date:date,note:note});renderMain();};r.readAsDataURL(file);}inp.value="";}
